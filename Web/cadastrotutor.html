<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro Tutor - Koavy</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="style.css">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            neon1: '#00f2ff',
            neon2: '#00d4aa',
            dark1: '#121212',
            dark2: '#0f1011',
          }
        }
      }
    }
  </script>
</head>

<body class="bg-dark2 text-gray-300 font-inter min-h-screen">


<div class="pt-24 pb-20 px-4 flex justify-center items-center min-h-screen">
  <div class="max-w-2xl w-full bg-white/5 border border-white/10 rounded-[40px] p-8 lg:p-12 backdrop-blur-md shadow-2xl relative overflow-hidden">
    
    <div class="absolute top-0 right-0 w-64 h-64 bg-neon1/5 rounded-full blur-[100px] -z-10 pointer-events-none"></div>

    <div class="text-center mb-10">
      <h1 class="text-4xl font-black text-white mb-4">Cadastro de Tutor</h1>
      <p class="text-gray-500">Vincule-se a um paciente para monitorar sua saúde em tempo real.</p>
    </div>

    <form id="tutor_form" class="space-y-8">
      
      <div class="space-y-6">
        
        <!-- Campos de cadastro de credenciais (ocultos se já logado) -->
        <div id="cadastroTutorFields" class="space-y-6">
          <div class="space-y-2">
            <label class="text-xs font-black uppercase tracking-widest text-gray-500 ml-1">Seu Nome Completo</label>
            <input id="nomeTutor" type="text" placeholder="Como devemos te chamar?" 
              class="w-full bg-black/40 border border-white/10 rounded-2xl px-6 py-4 text-white focus:outline-none focus:border-neon1/50 focus:ring-1 focus:ring-neon1/20 transition-all placeholder:text-gray-700">
          </div>

          <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            <div class="space-y-2">
              <label class="text-xs font-black uppercase tracking-widest text-gray-500 ml-1">E-mail</label>
              <input id="emailTutor" type="email" placeholder="seu@email.com" 
                class="w-full bg-black/40 border border-white/10 rounded-2xl px-6 py-4 text-white focus:outline-none focus:border-neon1/50 focus:ring-1 focus:ring-neon1/20 transition-all placeholder:text-gray-700">
            </div>
            <div class="space-y-2">
              <label class="text-xs font-black uppercase tracking-widest text-gray-500 ml-1">Senha de Acesso</label>
              <input id="senhaTutor" type="password" placeholder="••••••••" 
                class="w-full bg-black/40 border border-white/10 rounded-2xl px-6 py-4 text-white focus:outline-none focus:border-neon1/50 focus:ring-1 focus:ring-neon1/20 transition-all placeholder:text-gray-700">
            </div>
            <div class="space-y-2 md:col-span-2">
              <label class="text-xs font-black uppercase tracking-widest text-gray-500 ml-1">WhatsApp / Telefone</label>
              <input id="telefoneTutor" type="text" placeholder="(00) 00000-0000" 
                class="w-full bg-black/40 border border-white/10 rounded-2xl px-6 py-4 text-white focus:outline-none focus:border-neon1/50 focus:ring-1 focus:ring-neon1/20 transition-all placeholder:text-gray-700">
            </div>
          </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
          <div class="space-y-2">
            <label class="text-xs font-black uppercase tracking-widest text-gray-500 ml-1">ID do Paciente</label>
            <input id="pacienteId" type="number" placeholder="Ex: 123" 
              class="w-full bg-black/40 border border-white/10 rounded-2xl px-6 py-4 text-white focus:outline-none focus:border-neon1/50 focus:ring-1 focus:ring-neon1/20 transition-all placeholder:text-gray-700">
            <p class="text-[10px] text-gray-600 ml-1">Peça o ID ao paciente cadastrado.</p>
          </div>
          <div class="space-y-2">
            <label class="text-xs font-black uppercase tracking-widest text-gray-500 ml-1">Data do Vínculo</label>
            <input id="dataVinculo" type="date" 
              class="w-full bg-black/40 border border-white/10 rounded-2xl px-6 py-4 text-white focus:outline-none focus:border-neon1/50 focus:ring-1 focus:ring-neon1/20 transition-all">
          </div>
        </div>
      </div>

      <div class="pt-6 border-t border-white/5">
        <div id="mensagemTutor" class="mb-6"></div>

        <button id="btnTutor" type="submit" class="w-full py-5 bg-gradient-to-r from-neon1 to-neon2 text-black font-black text-lg rounded-2xl shadow-xl shadow-neon1/20 hover:scale-[1.01] active:scale-[0.99] transition-all">
          Vincular como Tutor
        </button>
        
        <p class="mt-8 text-center text-gray-500 text-sm">
          Você é o paciente? 
          <a href="cadastro.html" class="text-neon1 font-bold hover:underline ml-1">Cadastrar como Paciente</a>
        </p>
      </div>

    </form>
  </div>
</div>

<style>
  /* Styles are handled via Tailwind CSS */
</style>

<script src="config.js"></script>
<script src="auth.js"></script>
<script src="components/navbar.js"></script>
<script defer src="cadastrotutor.js"></script>
</body>
</html>
