<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dashboard Tutor - Koavy</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="style.css">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: { neon1: '#00f2ff', neon2: '#00d4aa', dark1: '#121212', dark2: '#0f1011' }
        }
      }
    }
  </script>
</head>
<body class="bg-[#050505] text-gray-300 font-inter min-h-screen">



<main class="pt-32 pb-20 px-4 max-w-7xl mx-auto">
    
    <div class="mb-12">
        <h2 class="text-4xl font-black text-white mb-2">Central de Monitoramento</h2>
        <p class="text-gray-500">Acompanhe a saúde de seus pacientes vinculados em tempo real.</p>
    </div>

    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8" id="patient-list">
        <!-- Patient Card 1 -->
        <div class="bg-white/5 border border-white/10 rounded-[40px] p-8 hover:border-neon1/50 transition-all group relative overflow-hidden">
            <div class="absolute top-0 right-0 p-6">
                 <span class="flex h-3 w-3">
                  <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-neon1 opacity-75"></span>
                  <span class="relative inline-flex rounded-full h-3 w-3 bg-neon1"></span>
                </span>
            </div>
            
            <div class="flex items-center gap-4 mb-8">
                <div class="w-16 h-16 rounded-2xl bg-gradient-to-br from-neon1 to-neon2 flex items-center justify-center text-2xl font-black text-black">JS</div>
                <div>
                    <h3 class="text-xl font-black text-white">João Silva</h3>
                    <p class="text-xs text-gray-500 uppercase tracking-widest">ID: #100</p>
                </div>
            </div>

            <div class="grid grid-cols-2 gap-4 mb-8">
                <div class="bg-black/40 p-4 rounded-2xl border border-white/5 text-center">
                    <p class="text-[10px] font-black text-gray-600 uppercase mb-1">BPM Atual</p>
                    <p class="text-3xl font-black text-neon1">74</p>
                </div>
                <div class="bg-black/40 p-4 rounded-2xl border border-white/5 text-center">
                    <p class="text-[10px] font-black text-gray-600 uppercase mb-1">Oxigênio</p>
                    <p class="text-3xl font-black text-emerald-400">98%</p>
                </div>
            </div>

            <button onclick="viewHistory(100)" class="w-full py-4 bg-white/5 border border-white/10 rounded-2xl font-black text-xs uppercase tracking-widest group-hover:bg-neon1 group-hover:text-black transition-all">Ver Histórico Completo</button>
        </div>

        <!-- Add New Patient Placeholder -->
        <a href="cadastrotutor.html" class="border-2 border-dashed border-white/10 rounded-[40px] p-8 flex flex-col items-center justify-center text-center hover:border-neon2/50 transition-all group">
            <div class="w-16 h-16 rounded-full bg-white/5 flex items-center justify-center mb-4 group-hover:bg-neon2/20 transition-all">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-gray-500 group-hover:text-neon2" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" /></svg>
            </div>
            <p class="font-black text-white">Vincular Novo Paciente</p>
            <p class="text-xs text-gray-500 mt-2">Você precisará do ID do paciente.</p>
        </a>
    </div>

    <!-- MODAL HISTÓRICO (SIMULAÇÃO) -->
    <div id="history-modal" class="fixed inset-0 bg-black/90 backdrop-blur-md hidden items-center justify-center z-[100] p-4">
        <div class="bg-[#1a1c1e] p-8 lg:p-12 rounded-[48px] w-full max-w-4xl border border-white/10 shadow-2xl max-h-[90vh] overflow-y-auto">
            <div class="flex justify-between items-center mb-10">
                <h2 class="text-3xl font-black text-white" id="modal-title">Histórico de João Silva</h2>
                <button onclick="closeHistory()" class="text-gray-500 hover:text-white text-2xl">✕</button>
            </div>
            
            <div class="space-y-6">
                <div class="p-6 bg-white/5 rounded-3xl border border-white/5">
                    <h4 class="text-xs font-black uppercase tracking-widest text-neon1 mb-4">Últimos Batimentos Registrados</h4>
                    <div id="exam-history-container" class="space-y-2">
                        <!-- Batimentos do BD -->
                    </div>
                </div>

                <div class="p-6 bg-white/5 rounded-3xl border border-white/5">
                    <h4 class="text-xs font-black uppercase tracking-widest text-neon1 mb-4">Relatório de Alertas</h4>
                    <div id="alert-history-container" class="space-y-2">
                        <!-- Alertas do BD -->
                    </div>
                </div>
            </div>

            <div class="mt-10 flex justify-end">
                <button onclick="closeHistory()" class="px-10 py-4 bg-white/5 hover:bg-white/10 rounded-2xl font-black text-xs uppercase tracking-widest transition-all">Fechar Visão</button>
            </div>
        </div>
    </div>

</main>

<script src="config.js"></script>
<script src="auth.js"></script>
<script src="components/navbar.js"></script>
<script>
    const user = Auth.check(2);
    if (user) {
        document.getElementById("user-name").innerText = user.nome;
    }

    let patientsData = [];

    async function loadPatients() {
        if (!user) return;
        try {
            const response = await fetch(`${CONFIG.API_BASE_URL}/tutor/pacientes`, {
                headers: Auth.getAuthHeader()
            });
            if (!response.ok) throw new Error("Erro ao obter pacientes");
            patientsData = await response.json();
            renderPatients();
        } catch (e) {
            console.error("Erro ao carregar telemetria do tutor:", e);
        }
    }

    function renderPatients() {
        const list = document.getElementById("patient-list");
        if (!list) return;

        list.innerHTML = "";

        patientsData.forEach(p => {
            const initials = p.nome ? p.nome.split(' ').map(n => n[0]).join('').substring(0, 2).toUpperCase() : '??';
            const lastBpm = p.ultimoBpm ? Math.round(p.ultimoBpm) : '--';
            const lastSat = p.ultimaSaturacao ? Math.round(p.ultimaSaturacao) : '--';

            let riskClass = "border-white/10";
            let pulseClass = "bg-emerald-500";
            
            if (p.ultimoBpm) {
                if (p.ultimoBpm > 120 || p.ultimoBpm < 50 || (p.ultimaSaturacao && p.ultimaSaturacao < 93)) {
                    riskClass = "border-red-500/50 bg-red-500/5";
                    pulseClass = "bg-red-500";
                } else if (p.ultimoBpm > 100 || p.ultimoBpm < 60) {
                    riskClass = "border-yellow-500/50 bg-yellow-500/5";
                    pulseClass = "bg-yellow-500";
                }
            }

            list.innerHTML += `
            <div class="bg-white/5 border ${riskClass} rounded-[40px] p-8 hover:border-neon1/50 transition-all group relative overflow-hidden">
                <div class="absolute top-0 right-0 p-6">
                     <span class="flex h-3 w-3">
                      <span class="animate-ping absolute inline-flex h-full w-full rounded-full ${pulseClass} opacity-75"></span>
                      <span class="relative inline-flex rounded-full h-3 w-3 ${pulseClass}"></span>
                    </span>
                </div>
                
                <div class="flex items-center gap-4 mb-8">
                    <div class="w-16 h-16 rounded-2xl bg-gradient-to-br from-neon1 to-neon2 flex items-center justify-center text-2xl font-black text-black">${initials}</div>
                    <div>
                        <h3 class="text-xl font-black text-white">${p.nome}</h3>
                        <p class="text-xs text-gray-500 uppercase tracking-widest">ID: #${p.id}</p>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-4 mb-8">
                    <div class="bg-black/40 p-4 rounded-2xl border border-white/5 text-center">
                        <p class="text-[10px] font-black text-gray-600 uppercase mb-1">BPM Atual</p>
                        <p class="text-3xl font-black text-neon1">${lastBpm}</p>
                    </div>
                    <div class="bg-black/40 p-4 rounded-2xl border border-white/5 text-center">
                        <p class="text-[10px] font-black text-gray-600 uppercase mb-1">Oxigênio</p>
                        <p class="text-3xl font-black text-emerald-400">${lastSat}%</p>
                    </div>
                </div>

                <button onclick="viewHistory(${p.id}, '${p.nome}')" class="w-full py-4 bg-white/5 border border-white/10 rounded-2xl font-black text-xs uppercase tracking-widest group-hover:bg-neon1 group-hover:text-black transition-all">Ver Histórico Completo</button>
            </div>
            `;
        });

        // Adicionar botão de vincular
        list.innerHTML += `
        <a href="cadastrotutor.html" class="border-2 border-dashed border-white/10 rounded-[40px] p-8 flex flex-col items-center justify-center text-center hover:border-neon2/50 transition-all group">
            <div class="w-16 h-16 rounded-full bg-white/5 flex items-center justify-center mb-4 group-hover:bg-neon2/20 transition-all">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-gray-500 group-hover:text-neon2" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" /></svg>
            </div>
            <p class="font-black text-white">Vincular Novo Paciente</p>
            <p class="text-xs text-gray-500 mt-2">Você precisará do ID do paciente.</p>
        </a>
        `;
    }

    async function viewHistory(id, nome) {
        document.getElementById("modal-title").innerText = `Histórico de ${nome}`;
        document.getElementById("history-modal").classList.remove("hidden");
        document.getElementById("history-modal").classList.add("flex");

        const examContainer = document.getElementById("exam-history-container");
        const alertContainer = document.getElementById("alert-history-container");

        examContainer.innerHTML = "<p class='text-xs text-gray-400 animate-pulse'>Carregando...</p>";
        alertContainer.innerHTML = "<p class='text-xs text-gray-400 animate-pulse'>Carregando...</p>";

        try {
            const resBat = await fetch(`${CONFIG.API_BASE_URL}/batimentos/usuario/${id}`, {
                headers: Auth.getAuthHeader()
            });
            const readings = await resBat.json();

            examContainer.innerHTML = "";
            if (!readings || readings.length === 0) {
                examContainer.innerHTML = "<p class='text-xs text-gray-500'>Nenhum batimento registrado recentemente.</p>";
            } else {
                readings.slice(0, 5).forEach(r => {
                    const time = new Date(r.dataHora || r.timestamp).toLocaleString('pt-BR');
                    examContainer.innerHTML += `
                        <div class="flex justify-between items-center p-3 bg-black/20 rounded-xl border border-white/5 mb-2 text-xs">
                            <span class="text-white font-bold">${r.bpm} BPM <span class="opacity-60 font-normal">(Saturação: ${r.saturacao || 98}%)</span></span>
                            <span class="text-[9px] text-gray-500 font-bold uppercase">${time}</span>
                        </div>
                    `;
                });
            }

            const resEmerg = await fetch(`${CONFIG.API_BASE_URL}/emergencias/usuario/${id}`, {
                headers: Auth.getAuthHeader()
            });
            const alerts = await resEmerg.json();

            alertContainer.innerHTML = "";
            if (!alerts || alerts.length === 0) {
                alertContainer.innerHTML = "<p class='text-xs text-gray-500'>Nenhum alerta crítico registrado.</p>";
            } else {
                alerts.slice(0, 5).forEach(a => {
                    const time = new Date(a.dataHora).toLocaleString('pt-BR');
                    const isCritical = a.tipo === 'CRITICO' || a.bpm_momento > 120 || a.bpm_momento < 50;
                    alertContainer.innerHTML += `
                        <div class="flex justify-between items-center p-3 ${isCritical ? 'bg-red-500/10 border-red-500/20' : 'bg-white/5 border-white/5'} rounded-xl border mb-2 text-xs">
                            <div>
                                <p class="font-bold ${isCritical ? 'text-red-400' : 'text-neon1'}">${a.descricao}</p>
                                <p class="text-[9px] text-gray-500 uppercase">${time}</p>
                            </div>
                            <span class="px-2 py-0.5 ${isCritical ? 'bg-red-500 text-white' : 'bg-neon1 text-black'} text-[8px] font-black rounded-full">${a.status || 'PENDENTE'}</span>
                        </div>
                    `;
                });
            }

        } catch (e) {
            console.error(e);
            examContainer.innerHTML = "<p class='text-xs text-red-400'>Falha ao carregar telemetria.</p>";
            alertContainer.innerHTML = "<p class='text-xs text-red-400'>Falha ao carregar alertas.</p>";
        }
    }

    function closeHistory() {
        document.getElementById("history-modal").classList.add("hidden");
        document.getElementById("history-modal").classList.remove("flex");
    }

    // Inicialização e loop de atualização em tempo real (a cada 3 segundos)
    loadPatients();
    setInterval(loadPatients, 3000);
</script>

</body>
</html>
